services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cc3088-cursos-app
    ports:
      - "24889:8000"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/database/database.sqlite
      SESSION_DRIVER: file
      CACHE_STORE: file
      QUEUE_CONNECTION: sync
    restart: unless-stopped